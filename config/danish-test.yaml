# CroCo Test Configuration - Small Model
#
# Quick pipeline validation using google/gemma-3-270m-it
# - Tiny model for fast iteration
# - 10 samples only
# - gold_chosen mode
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-test.yaml

construction_mode: gold_chosen
score_gold_output: true
language: da

policy:
  model_id: google/gemma-3-270m-it
  attn_implementation: sdpa
  max_model_len: 2048

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768

generation:
  num_candidates: 4
  max_tokens: 1024
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.4  # Low to leave room for reward model

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 10
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 2048
  seed: 42

dpo:
  output_dir: models/croco-gemma-3-270m-da-test
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_length: 2048
  bf16: true
  gradient_checkpointing: false
  curriculum: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  seed: 42

eval:
  language: da
  tasks: null
  num_iterations: 1
  skip: false
  gpu_memory_utilization: 0.5  # Lower for eval with base model + LoRA
