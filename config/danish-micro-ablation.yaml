# CroCo micro pre-flight - exercises every new DPO knob at once on 10 samples.
#
# Not a quality experiment: it just confirms that loss_type=sigmoid_norm and
# label_smoothing (the knobs the ls/simpo runs actually use) train without runtime
# errors (with our LoRA implicit-reference + curriculum sampler) before committing
# hours to the real ablations. No Hub upload.
#
# precompute_ref_log_probs is deliberately NOT exercised here: no queued run uses
# it, and TRL's precompute path memory-maps a /tmp datasets arrow cache that proved
# fragile on the shared box (the file vanished mid-run and aborted the gate on
# 2026-06-30). If we ever enable it for real, point HF_DATASETS_CACHE/TMPDIR at
# persistent on-disk storage first.
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-micro-ablation.yaml

construction_mode: max_reward
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 1024
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 10
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 3072
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-micro-ablation
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 2048
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: null
  # The knobs the ls/simpo runs use - this run only checks they execute cleanly.
  loss_type: sigmoid_norm
  label_smoothing: 0.05

eval:
  language: da
  tasks: null
  skip: true
  gpu_memory_utilization: 0.5
