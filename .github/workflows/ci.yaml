name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  code-check:
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uvx pre-commit run --show-diff-on-failure --color=always --all-files
        shell: bash

  pytest:
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    strategy:
        matrix:
            os: [windows-latest, macos-latest, ubuntu-latest]
            python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Test with pytest
        run: uv run pytest
