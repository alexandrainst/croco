# CroCo Pipeline Configuration - Danish Laerebogen
#
# construction_mode:
#   generated   - policy self-generates all candidates; chosen/rejected are picked
#                 from them via the reward model (CroCo Eq. 2).
#   gold_chosen - the dataset's gold `output` is the chosen response and only the
#                 rejected response is generated and reward-scored.
# Curriculum learning (dpo.curriculum): when true, training pairs are ordered by
# ascending `evolution` (easy -> hard) and consumed without shuffling.

construction_mode: generated
score_gold_output: true
language: da

policy:
  model_id: google/gemma-3-12b-it
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768

generation:
  num_candidates: 64
  max_tokens: 4096
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.95

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 20000
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 4096
  seed: 42

dpo:
  output_dir: models/croco-gemma-3-12b-da
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true  # Order pairs easy -> hard by evolution; no shuffling
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42

eval:
  language: da
  tasks: null  # null = all available tasks for this language
  num_iterations: 10
