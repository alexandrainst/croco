# CroCo Pilot Training Configuration - Danish Laerebogen with Munin-Qwen3.5-9B
#
# Pilot run with danish-foundation-models/munin-qwen3.5-9B
# A Danish Qwen3.5-9B variant (~9.7B params, 5 shards)
# Uses gold_chosen mode with 100 samples for quick validation
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-pilot-munin.yaml

construction_mode: gold_chosen
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-qwen3.5-9B
  attn_implementation: sdpa
  max_model_len: 2048  # Reduced for GB10 unified memory

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768

generation:
  num_candidates: 8
  max_tokens: 2048  # Reduced for GB10 unified memory
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.35  # Leave room for 8B reward model on GB10 unified memory

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 100
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 4096
  seed: 42

dpo:
  output_dir: models/croco-munin-qwen3.5-9b-da-pilot
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42

eval:
  language: da
  tasks: null
  num_iterations: 5
  gpu_memory_utilization: 0.5
