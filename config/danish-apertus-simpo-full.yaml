# CroCo ablation - Munin-Apertus-8B (Danish), true reference-free SimPO
#
# Single-variable follow-up to config/danish-apertus-simpo-tuned.yaml: same
# max_reward data, LoRA recipe and beta=2.0, but swaps TRL's reference-based
# sigmoid_norm for TRUE SimPO - a reference-free reward equal to the raw
# length-normalised policy log-probability, plus an explicit target margin
# (gamma). Implemented via a custom DPOTrainer subclass in src/croco/dpo.py
# (no TRL edits); loss_type: simpo selects it. vs the tuned run the single
# variable is the move from ref-based length-normalised DPO to ref-free SimPO
# (drops the reference model, adds gamma).
#
# beta=2.0 and target_margin=0.5 (the conservative end of the paper's 0.5-1.0
# range; 1.0 is the alternative matching the paper's strongest setup). See Meng
# et al. 2024, arXiv 2405.14734.
#
# Reuses the already-built max_reward pairs (data/pairs_apertus.jsonl) - run
# with --skip-build.
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-apertus-simpo-full.yaml \
#     --dataset-output data/pairs_apertus.jsonl --skip-build

construction_mode: max_reward
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 2048
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45
  batch_size: 64
  enable_prefix_caching: true
  enable_chunked_prefill: true
  language_model_only: false

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 5000
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 2048
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-simpo-full
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 2.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: danish-foundation-models/croco-munin-apertus-8b-da-simpo-full
  save_steps: 100
  # TRUE reference-free SimPO (fixed bug in src/croco/dpo.py).
  loss_type: simpo
  target_margin: 0.5
  # Ref-free SimPO has no reference model, so precompute_ref_log_probs does not
  # apply.

eval:
  language: da
  tasks: null
  num_iterations: 1
  skip: true
  gpu_memory_utilization: 0.5
