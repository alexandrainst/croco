# CroCo run - Munin-Apertus-8B (Danish), gold_chosen mode
#
# Ablation companion to config/danish-apertus.yaml (max_reward). Same data,
# generation and DPO settings; only the preference-construction mode differs, so
# the EuroEval scores can be compared against the max_reward model.
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-apertus-gold.yaml

# gold_chosen: chosen is always the dataset's gold output; rejected is the
# self-generation nearest mu-2sigma. Gold is the chosen response regardless of
# its reward, so no example is discarded (even when a generation outscores gold).
construction_mode: gold_chosen
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 2048
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45
  batch_size: 64
  enable_prefix_caching: true
  enable_chunked_prefill: true
  language_model_only: false

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 5000
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 2048
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-gold
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  # Effective batch 8 via 8 x 1. Per-device 1 avoids intra-batch padding waste,
  # making it faster per step and lighter on memory than larger per-device batches.
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: danish-foundation-models/croco-munin-apertus-8b-da-gold
  save_steps: 100

eval:
  language: da
  tasks: null
  num_iterations: 1
  skip: true
  gpu_memory_utilization: 0.5
