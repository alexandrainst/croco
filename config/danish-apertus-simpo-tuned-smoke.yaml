# Smoke test for SimPO-tuned ablation - reproduces TMPDIR cache race bug
#
# This config triggers the precompute_ref_log_probs path that has failed 3+
# times with FileNotFoundError on the Arrow cache file. Use this to reproduce
# and debug the race condition.
#
# Known failure:
#   FileNotFoundError: [Errno 2] Failed to open local file
#   '/home/saattrupdan/croco/.tmp/hf_datasets-*/cache-*.arrow'
#
# Hypothesis: The datasets library creates a temp subdirectory in TMPDIR,
# writes the cache file, then either (a) the path recorded doesn't match the
# actual location, or (b) something cleans the directory mid-process.
#
# Usage:
#   # Reproduce the bug (expected to fail)
#   tmux new-session -d -s test_smoke "bash -lc 'cd ~/croco && TMPDIR=~/croco/.tmp HF_DATASETS_CACHE=~/croco/.hf_datasets_cache uv run src/scripts/run_pipeline.py -c config/danish-apertus-simpo-tuned-smoke.yaml --dataset-output data/pairs_smoke.jsonl --candidate-cache data/candidates_smoke_cache.jsonl --skip-build 2>&1 | tee smoke_test.log'"
#
#   # Monitor
#   tmux attach -t test_smoke
#   tail -f ~/croco/smoke_test.log

construction_mode: max_reward
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 1024  # Reduced for faster loading

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 1024
  gpu_memory_utilization: 0.2

generation:
  num_candidates: 2
  max_tokens: 128
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.2
  batch_size: 8
  enable_prefix_caching: true
  language_model_only: false

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 8  # Minimal for smoke test
  stratify_by_evolution: false
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 256
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-simpo-tuned-smoke
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 2.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  num_train_epochs: 1
  max_length: 512  # Reduced
  bf16: true
  gradient_checkpointing: false
  curriculum: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: null
  save_steps: 5
  loss_type: sigmoid_norm
  # THIS IS THE TRIGGER: precompute_ref_log_probs causes cache write to TMPDIR
  precompute_ref_log_probs: true

eval:
  language: da
  tasks: null
  skip: true
  gpu_memory_utilization: 0.5
