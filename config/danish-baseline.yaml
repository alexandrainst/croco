# CroCo Baseline Evaluation Configuration
#
# Evaluates the base policy model (google/gemma-3-12b-it) on EuroEval Danish
# tasks without any CroCo training. Use this to establish a performance
# baseline before running the full pipeline.
#
# Usage:
#   uv run src/scripts/eval_model.py --config config/danish-baseline.yaml

construction_mode: generated
score_gold_output: true
language: da

policy:
  model_id: google/gemma-3-12b-it
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768

generation:
  num_candidates: 64
  max_tokens: 4096
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.95

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 100
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 4096
  seed: 42

dpo:
  output_dir: models/croco-gemma-3-12b-da
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42

eval:
  language: da
  tasks: null
  num_iterations: 5
