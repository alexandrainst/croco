# CroCo reward-model ablation - Munin-Apertus-8B (Danish), max_reward
#
# Identical to danish-apertus.yaml (the winning max_reward construction mode)
# except the reward model is swapped to Skywork-Reward-V2-Llama-3.1-8B-40M, which
# beats the Qwen3 reward model on RewardBench-v2. Question: does the stronger RM
# yield better EuroEval scores?
#
# OBJECTIVE - this ablation must use the WINNING DPO objective from the ls/simpo
# comparison, not necessarily vanilla DPO. Before running, set the dpo block to
# match the winner (see the marked line below):
#   - vanilla DPO wins  -> leave as is
#   - label smoothing   -> add `label_smoothing: 0.05`
#   - SimPO             -> add `loss_type: sigmoid_norm`
#
# IMPORTANT - this is a two-step workflow, because the candidate-cache signature
# does NOT encode the reward model (it would otherwise reuse the Qwen3 scores):
#
#   1. Re-score the existing cache with the new RM (cheap; reuses generations):
#        uv run src/scripts/rescore_candidates.py \
#          -i data/candidates_cache.jsonl \
#          -o data/candidates_cache_llama_rm.jsonl \
#          --reward-model-id Skywork/Skywork-Reward-V2-Llama-3.1-8B-40M
#
#   2. Build max_reward pairs from the RE-SCORED cache, then DPO-train:
#        uv run src/scripts/run_pipeline.py -c config/danish-apertus-llama-rm.yaml \
#          --dataset-output data/pairs_llama_rm.jsonl \
#          --candidate-cache data/candidates_cache_llama_rm.jsonl
#
# Step 2 is a full cache hit (no GPU generation); it just reconstructs the
# chosen/rejected pairs from the new scores. Evals run separately (eval.skip).

construction_mode: max_reward
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Llama-3.1-8B-40M
  max_model_len: 32768
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 2048
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.30
  batch_size: 64
  enable_prefix_caching: true
  enable_chunked_prefill: true
  language_model_only: false

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 5000
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 2048
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-llamarm
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 4096
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: danish-foundation-models/croco-munin-apertus-8b-da-llamarm
  save_steps: 100
  # OBJECTIVE: set to the ls/simpo winner before running (see header). Add
  # `label_smoothing: 0.05` if ls wins, or `loss_type: sigmoid_norm` if SimPO
  # wins; leave neither if vanilla DPO wins.
  #
  # OPTIMIZATIONS (TRL 1.7.0+):
  precompute_ref_log_probs: true  # Skip ref forward pass per step (~30-50% faster)
  # NOTE: `torch_compile` and `dataloader_num_workers` are NOT DPOTrainConfig
  # fields - pydantic silently drops them and they never reach the trainer. They
  # have been removed from this config (they were never actually enabled).

eval:
  language: da
  tasks: null
  skip: true
  gpu_memory_utilization: 0.35
