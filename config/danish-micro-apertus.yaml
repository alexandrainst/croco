# CroCo Micro Test - Munin-Apertus-8B
#
# Minimal test run with danish-foundation-models/munin-apertus-8b
# Non-reasoning model, 8B params, 10 samples for quick validation
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-micro-apertus.yaml

construction_mode: gold_chosen
score_gold_output: true
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 2048

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768
  # Fraction of the (unified) memory pool for the reward engine. Coexists with the
  # generation engine during the build phase, so gen + reward should stay well under 1.0.
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 1024
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 10
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 2048
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-micro
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 2048
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: danish-foundation-models/croco-munin-apertus-8b-da-micro

eval:
  language: da
  tasks: null
  num_iterations: 1
  skip: true
  gpu_memory_utilization: 0.5
