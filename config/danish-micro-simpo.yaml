# CroCo micro pre-flight - exercises the custom ref-free SimPO loss on 10
# samples.
#
# Not a quality experiment: it just confirms that loss_type=simpo with
# target_margin (the custom ref-free SimPO path in src/croco/dpo.py) trains
# without runtime errors (with our LoRA adapter + curriculum sampler) before
# committing ~8h to the full run in config/danish-apertus-simpo-full.yaml. Loss
# knobs match that run (beta=2.0, target_margin=0.5) so the smoke is
# representative. No Hub upload.
#
# Usage:
#   uv run src/scripts/run_pipeline.py --config config/danish-micro-simpo.yaml

construction_mode: max_reward
language: da

policy:
  model_id: danish-foundation-models/munin-apertus-8b
  attn_implementation: sdpa
  max_model_len: 4096

reward:
  model_id: Skywork/Skywork-Reward-V2-Qwen3-8B
  max_model_len: 32768
  gpu_memory_utilization: 0.35

generation:
  num_candidates: 4
  max_tokens: 1024
  temperature: 0.7
  top_p: 1.0
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45

data:
  dataset_id: danish-foundation-models/laerebogen
  subset: evolved
  split: train
  num_samples: 10
  stratify_by_evolution: true
  evolution_min: null
  evolution_max: null
  max_prompt_tokens: 3072
  seed: 42

dpo:
  output_dir: models/croco-munin-apertus-8b-da-micro-simpo
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  beta: 2.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_length: 2048
  bf16: true
  gradient_checkpointing: true
  curriculum: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  seed: 42
  hf_repo_id: null
  # Custom ref-free SimPO loss (src/croco/dpo.py); knobs match the full run.
  loss_type: simpo
  target_margin: 0.5

eval:
  language: da
  tasks: null
  skip: true
  gpu_memory_utilization: 0.5
